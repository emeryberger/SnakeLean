name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Installs elan + the toolchain pinned in lean-toolchain, then `lake build`.
      - name: Install Lean and build
        uses: leanprover/lean-action@v1
        with:
          build-args: "SnakeLean"

      - name: Comprehension regression tests
        run: |
          lake env lean Comprehensions.lean > Comprehensions_out.py
          python3 Comprehensions_test.py

      - name: Tail-call regression tests
        run: |
          lake env lean TailCalls.lean > TailCalls_out.py
          python3 TailCalls_test.py

      - name: Bool-branch / min-max regression tests
        run: |
          lake env lean RegressionFixes.lean > RegressionFixes_out.py
          python3 RegressionFixes_test.py
